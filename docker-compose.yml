version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: careertwin-postgres
    environment:
      POSTGRES_USER: careertwin
      POSTGRES_PASSWORD: careertwin_dev
      POSTGRES_DB: careertwin
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U careertwin']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: careertwin-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
